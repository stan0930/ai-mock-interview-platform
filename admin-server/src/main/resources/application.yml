server:
  port: 8081
  servlet:
    context-path: /admin

spring:
  application:
    name: a05-admin-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # ============================================================
    # TODO: 请替换以下占位符为真实数据库配置
    # ============================================================
    url: jdbc:mysql://<DB_HOST>:3306/<DB_NAME>?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: <DB_USERNAME>
    password: <DB_PASSWORD>
    # HikariCP 连接池（Spring Boot 默认）
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    # 开启驼峰命名自动映射
    map-underscore-to-camel-case: true
    # 开发阶段打印 SQL，生产环境请关闭
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 全局逻辑删除字段名
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.a05.admin: debug
